<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — Insighta Labs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; }
    nav { background: #1e293b; border-bottom: 1px solid #334155; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-size: 20px; font-weight: 800; color: #38bdf8; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { color: #94a3b8; text-decoration: none; font-size: 14px; }
    .nav-links a:hover, .nav-links a.active { color: #e2e8f0; }
    .nav-user { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; }
    .main { padding: 32px; max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
    .search-box { display: flex; gap: 12px; margin-bottom: 24px; }
    .search-box input { flex: 1; background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 12px 16px; border-radius: 8px; font-size: 16px; }
    .btn { background: #38bdf8; color: #0f172a; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
    .examples { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
    .examples span { background: #1e293b; padding: 4px 8px; border-radius: 4px; margin-right: 8px; cursor: pointer; border: 1px solid #334155; }
    .examples span:hover { border-color: #38bdf8; color: #38bdf8; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
    th { background: #0f172a; padding: 12px 16px; text-align: left; font-size: 12px; color: #94a3b8; text-transform: uppercase; }
    td { padding: 12px 16px; border-top: 1px solid #334155; font-size: 14px; }
    tr:hover td { background: #334155; cursor: pointer; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .male { background: #1d4ed8; color: #bfdbfe; }
    .female { background: #7c3aed; color: #ede9fe; }
    .results-info { color: #94a3b8; font-size: 14px; margin-bottom: 12px; }
    .logout-btn { background: transparent; color: #94a3b8; border: none; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">Insighta Labs+</div>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/profiles">Profiles</a>
      <a href="/search" class="active">Search</a>
      <a href="/account">Account</a>
    </div>
    <div class="nav-user">
      <img id="avatar" class="avatar" src="" alt="avatar">
      <span id="username"></span>
      <form action="/logout" method="POST">
        <button class="logout-btn" type="submit">Logout</button>
      </form>
    </div>
  </nav>
  <div class="main">
    <h1>Natural Language Search</h1>
    <div class="search-box">
      <input id="query" type="text" placeholder='Try "young males from nigeria" or "female seniors from kenya"'>
      <button class="btn" onclick="search()">Search</button>
    </div>
    <div class="examples">
      Examples:
      <span onclick="setQuery('young males from nigeria')">young males from nigeria</span>
      <span onclick="setQuery('female seniors from kenya')">female seniors from kenya</span>
      <span onclick="setQuery('adult males from ghana')">adult males from ghana</span>
      <span onclick="setQuery('females above 30')">females above 30</span>
    </div>
    <div id="results-info" class="results-info"></div>
    <table id="table" style="display:none">
      <thead>
        <tr>
          <th>Name</th>
          <th>Gender</th>
          <th>Age</th>
          <th>Age Group</th>
          <th>Country</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <script>
    const user = JSON.parse(decodeURIComponent(document.cookie.split('user=')[1]?.split(';')[0] || '{}'));
    document.getElementById('username').textContent = '@' + (user.username || '');
    document.getElementById('avatar').src = user.avatar_url || '';

    function setQuery(q) {
      document.getElementById('query').value = q;
      search();
    }

    async function search() {
      const q = document.getElementById('query').value;
      if (!q) return;
      document.getElementById('results-info').textContent = 'Searching...';
      const res = await fetch('/api/profiles/search?q=' + encodeURIComponent(q));
      const data = await res.json();
      if (data.status === 'error') {
        document.getElementById('results-info').textContent = data.message;
        document.getElementById('table').style.display = 'none';
        return;
      }
      document.getElementById('results-info').textContent = `Found ${data.total} results`;
      document.getElementById('table').style.display = 'table';
      document.getElementById('tbody').innerHTML = data.data.map(p => `
        <tr onclick="window.location='/profiles/${p.id}'">
          <td>${p.name}</td>
          <td><span class="badge ${p.gender}">${p.gender}</span></td>
          <td>${p.age}</td>
          <td>${p.age_group}</td>
          <td>${p.country_id}</td>
        </tr>
      `).join('');
    }

    document.getElementById('query').addEventListener('keypress', e => {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
